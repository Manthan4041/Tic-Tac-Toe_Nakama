version: '3'

services:
  cockroachdb:
    image: cockroachdb/cockroach:v23.1.11
    command: start-single-node --insecure --store=attrs=ssd,path=/var/lib/cockroach/
    restart: "no"
    volumes:
      - cockroachdb-data:/var/lib/cockroach
    expose:
      - "8080"
      - "26257"
    ports:
      - "26257:26257"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 15s

  nakama:
    build:
      context: ./nakama
      dockerfile: Dockerfile
    depends_on:
      cockroachdb:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address root@cockroachdb:26257 &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address root@cockroachdb:26257
    expose:
      - "7349"
      - "7350"
      - "7351"
      - "7352"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
      - "7352:7352"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: "no"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    depends_on:
      nakama:
        condition: service_healthy
    ports:
      - "5173:5173"
    restart: "no"

volumes:
  cockroachdb-data:
